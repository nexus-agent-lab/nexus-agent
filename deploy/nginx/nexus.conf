upstream nexus_app_upstream {
    server nexus-app:8000;
}

upstream nexus_web_upstream {
    server web:3000;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 8000;
    server_name _;

    client_max_body_size 20m;

    location = /chat/stream {
        proxy_pass http://nexus_app_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    location ~ ^/(auth|admin|plugins|skills|skill-learning|secrets|secure|memskills|roadmap|users|memories|audit|system|chat|voice)(/|$) {
        proxy_pass http://nexus_app_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
    }

    location = /openapi.json {
        proxy_pass http://nexus_app_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location ~ ^/(docs|redoc)(/|$) {
        proxy_pass http://nexus_app_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://nexus_web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
    }
}
